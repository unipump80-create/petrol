<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Petrol — цены на топливо в Иваново</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Petrol">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel2: #21252e;
    --border: #2c313c;
    --text: #e6e8ec;
    --muted: #8b92a0;
    --accent: #4f9cff;
    --cheap: #2ecc71;
    --mid: #f1c40f;
    --exp: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .upd { margin-left: auto; color: var(--muted); font-size: 12px; }

  .summary { display: flex; gap: 10px; padding: 12px 20px; overflow-x: auto;
    border-bottom: 1px solid var(--border); }
  .scard { background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; min-width: 120px; }
  .scard .ft { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .scard .avg { font-size: 20px; font-weight: 700; }
  .scard .mm { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .controls { padding: 10px 20px; display: flex; gap: 10px; align-items: center;
    border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .controls label { font-size: 13px; color: var(--muted); }
  select, button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer;
  }
  button.active { border-color: var(--accent); color: var(--accent); }

  .main { display: grid; grid-template-columns: 1fr 420px; height: calc(100vh - 0px); }
  #map { height: 100%; background: #0a0c10; }
  .list { background: var(--panel); border-left: 1px solid var(--border);
    overflow-y: auto; }
  .row { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background .12s; }
  .row:hover, .row.sel { background: var(--panel2); }
  .row .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .row .name { font-size: 14px; font-weight: 600; }
  .row .price { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .row .addr { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .row .brand { font-size: 11px; color: var(--accent); }
  .badge { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px;
    margin-top: 5px; font-weight: 600; }
  .badge.fresh { background: rgba(46,204,113,.15); color: var(--cheap); }
  .badge.recent { background: rgba(241,196,15,.15); color: var(--mid); }
  .badge.stale { background: rgba(231,76,60,.18); color: var(--exp); }
  .badge.none { background: rgba(139,146,160,.15); color: var(--muted); }
  .row.unavail { opacity: .6; }
  .row.unavail .price { color: var(--muted); }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle; }
  .leaflet-popup-content { font-size: 13px; }
  .pin { border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 4px rgba(0,0,0,.6);
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff; }
  .empty { padding: 30px; text-align: center; color: var(--muted); }
  .update-bar {
    position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
    background: var(--accent); color: #fff; border-radius: 12px;
    padding: 12px 16px; display: none; align-items: center; gap: 14px;
    box-shadow: 0 6px 24px rgba(0,0,0,.5); z-index: 9999; font-size: 14px;
    max-width: calc(100vw - 32px);
  }
  .update-bar.show { display: flex; }
  .update-bar button {
    background: #fff; color: var(--accent); border: none; font-weight: 700;
    padding: 7px 14px; border-radius: 8px; cursor: pointer; white-space: nowrap;
  }
  .update-bar .x { background: transparent; color: #fff; padding: 4px 8px; font-weight: 400; }
  @media (max-width: 820px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
    .list { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<header>
  <h1>⛽ Petrol</h1>
  <span class="sub">цены на топливо · Иваново</span>
  <span class="upd" id="upd"></span>
</header>

<div class="summary" id="summary"></div>

<div class="controls">
  <label>Топливо:</label>
  <select id="fuel"></select>
  <button id="sortPrice" class="active">по цене</button>
  <button id="sortName">по названию</button>
  <button id="showUnavail" class="active" style="margin-left:14px">⛔ где нет топлива</button>
  <button id="gazpromBtn" style="margin-left:8px">🔵 Газпромнефть</button>
  <button id="refreshBtn" style="margin-left:8px">🔄 Обновить</button>
  <span class="sub" id="count"></span>
</div>

<div class="main">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<div class="update-bar" id="updateBar">
  <span>🔄 Доступна новая версия</span>
  <button id="updateBtn">Обновить</button>
  <button class="x" id="updateDismiss">✕</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// База API: '' = тот же хост (PWA). Для APK на хостинг — задать window.PETROL_API
const API = (window.PETROL_API || '').replace(/\/$/, '');
const IVANOVO = [57.0, 40.97];
let map, markers = {}, stations = [], sortBy = 'price', curFuel = 'ai95';
let showUnavail = true; // показывать ли АЗС без выбранного топлива (серым)
let showOnlyGazprom = false; // только Газпромнефть
const GRAY = '#8b92a0';

function fuelName() {
  const sel = document.getElementById('fuel');
  return sel.selectedOptions[0]?.textContent || 'топлива';
}

function daysAgo(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function freshInfo(days) {
  if (days == null) return { cls: 'stale', txt: 'нет данных' };
  let txt = days <= 0 ? 'сегодня' : days === 1 ? 'вчера' : days + ' дн назад';
  let cls = days <= 1 ? 'fresh' : days <= 5 ? 'recent' : 'stale';
  return { cls, txt };
}

function colorFor(price, min, max) {
  if (price == null || max === min) return '#888';
  const t = (price - min) / (max - min); // 0 дёшево .. 1 дорого
  // green -> yellow -> red
  const r = t < .5 ? Math.round(510 * t) : 255;
  const g = t < .5 ? 200 : Math.round(400 * (1 - t));
  return `rgb(${Math.min(r,255)},${Math.min(g,200)},60)`;
}

function initMap() {
  map = L.map('map', { zoomControl: true }).setView(IVANOVO, 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);
}

async function loadSummary() {
  let d;
  if (showOnlyGazprom) {
    d = await (await fetch(API + '/prices/gazprom/availability')).json();
    document.getElementById('upd').textContent = `Газпромнефть · ${d.total_stations} АЗС`;
  } else {
    d = await (await fetch(API + '/prices/summary')).json();
    document.getElementById('upd').textContent =
      'обновлено: ' + (d.updated_at ? d.updated_at.slice(0,10) : '—') + ` · ${d.stations} АЗС`;
  }

  const box = document.getElementById('summary');

  if (showOnlyGazprom) {
    // Для Газпромнефти формат другой
    const fuels = Object.entries(d.fuel_types || {}).map(([code, info]) => ({
      code,
      name: {ai92:'АИ-92', ai95:'АИ-95', ai98:'АИ-98', ai100:'АИ-100', diesel:'ДТ', gas:'Газ', ai95plus:'АИ-95+'}[code] || code,
      avg: info.avg_price,
      min: info.min_price,
      max: info.max_price,
      count: info.stations
    }));
    box.innerHTML = fuels.map(f => `
      <div class="scard">
        <div class="ft">${f.name}</div>
        <div class="avg">${f.avg?.toFixed(2) || '—'} ₽</div>
        <div class="mm">${f.min?.toFixed(2) || '—'} – ${f.max?.toFixed(2) || '—'} · ${f.count} АЗС</div>
      </div>`).join('');
    const sel = document.getElementById('fuel');
    sel.innerHTML = Object.keys(d.fuel_types || {}).map(code =>
      `<option value="${code}">${{ai92:'АИ-92', ai95:'АИ-95', ai98:'АИ-98', ai100:'АИ-100', diesel:'ДТ', gas:'Газ', ai95plus:'АИ-95+'}[code] || code}</option>`).join('');
  } else {
    // Обычный формат для всех АЗС
    box.innerHTML = d.fuels.map(f => `
      <div class="scard">
        <div class="ft">${f.fuel_name}</div>
        <div class="avg">${f.avg.toFixed(2)} ₽</div>
        <div class="mm">${f.min} – ${f.max} · ${f.count} АЗС</div>
      </div>`).join('');
    const sel = document.getElementById('fuel');
    sel.innerHTML = d.fuels.map(f =>
      `<option value="${f.fuel_type}">${f.fuel_name}</option>`).join('');
    if (d.fuels.find(f => f.fuel_type === 'ai95')) sel.value = 'ai95';
    else if (d.fuels[0]) curFuel = d.fuels[0].fuel_type, sel.value = curFuel;
  }
  curFuel = document.getElementById('fuel').value;
}

async function loadStations() {
  if (showOnlyGazprom) {
    await loadGazpromStations();
  } else {
    const url = `${API}/stations?fuel=${curFuel}&sort=${sortBy}`;
    stations = await (await fetch(url)).json();
  }
  render();
}

async function loadGazpromStations() {
  const d = await (await fetch(API + '/prices/gazprom/locations')).json();
  // Преобразуем формат из API в формат для станций
  stations = (d.stations || []).map(s => ({
    id: s.id,
    name: s.name,
    address: s.address,
    brand: 'Газпромнефть',
    lat: s.lat,
    lon: s.lon,
    price: s.prices[curFuel],
    available: curFuel in (s.prices || {}),
    observed_at: null // Газпромнефть не имеет времени обновления в нашем формате
  }));

  // Сортируем по цене или имени
  if (sortBy === 'price') {
    stations.sort((a, b) => {
      const pa = a.price !== undefined ? a.price : Infinity;
      const pb = b.price !== undefined ? b.price : Infinity;
      return pa - pb;
    });
  } else if (sortBy === 'name') {
    stations.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  }
}

function render() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const list = document.getElementById('list');

  // тумблер «нет топлива»
  const visible = stations.filter(s =>
    showUnavail || s.available !== false);

  // min/max только по доступным с ценой
  const prices = visible.filter(s => s.available && s.price != null).map(s => s.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  const fname = fuelName();
  const nUnavail = visible.filter(s => s.available === false).length;
  document.getElementById('count').textContent =
    `${visible.length} из ${stations.length} АЗС` + (nUnavail ? ` · ${nUnavail} без ${fname}` : '');

  if (!visible.length) { list.innerHTML = '<div class="empty">Нет данных</div>'; return; }

  list.innerHTML = visible.map(s => {
    const avail = s.available !== false;
    const c = avail ? colorFor(s.price, min, max) : GRAY;
    const badge = avail
      ? `<span class="badge ${freshInfo(daysAgo(s.observed_at)).cls}">обновлено ${freshInfo(daysAgo(s.observed_at)).txt}</span>`
      : `<span class="badge none">нет ${fname}</span>`;
    return `<div class="row ${avail ? '' : 'unavail'}" data-id="${s.id}">
      <div class="top">
        <span class="name"><span class="dot" style="background:${c}"></span>${s.name||'АЗС'}</span>
        <span class="price">${avail && s.price != null ? s.price.toFixed(2)+' ₽' : '—'}</span>
      </div>
      <div class="brand">${s.brand||''}</div>
      <div class="addr">${s.address||''}</div>
      ${badge}
    </div>`;
  }).join('');

  visible.forEach(s => {
    if (s.lat == null || s.lon == null) return;
    const avail = s.available !== false;
    const c = avail ? colorFor(s.price, min, max) : GRAY;
    const label = avail && s.price != null ? Math.round(s.price) : '✕';
    const opacity = avail ? 1 : .65;
    const icon = L.divIcon({ className: '', iconSize: [30,30], html:
      `<div class="pin" style="background:${c};opacity:${opacity}">${label}</div>` });
    const m = L.marker([s.lat, s.lon], { icon }).addTo(map);
    const info = avail
      ? `<b>${s.price != null ? s.price.toFixed(2)+' ₽' : '—'}</b><br>
         <span style="color:#888">обновлено ${freshInfo(daysAgo(s.observed_at)).txt}</span>`
      : `<span style="color:#888">нет ${fname}</span>`;
    m.bindPopup(`<b>${s.name||'АЗС'}</b><br>${s.brand||''}<br>${s.address||''}<br>${info}`);
    m.on('click', () => selectRow(s.id));
    markers[s.id] = m;
  });

  list.querySelectorAll('.row').forEach(row => {
    row.onclick = () => {
      const id = +row.dataset.id;
      const s = stations.find(x => x.id === id);
      if (s && s.lat) { map.setView([s.lat, s.lon], 15); markers[id]?.openPopup(); }
      selectRow(id);
    };
  });
}

function selectRow(id) {
  document.querySelectorAll('.row').forEach(r =>
    r.classList.toggle('sel', +r.dataset.id === id));
}

document.getElementById('fuel').onchange = e => {
  curFuel = e.target.value;
  if (showOnlyGazprom) {
    loadSummary();
  }
  loadStations();
};
document.getElementById('sortPrice').onclick = e => {
  sortBy = 'price'; setSortBtn(); loadStations(); };
document.getElementById('sortName').onclick = e => {
  sortBy = 'name'; setSortBtn(); loadStations(); };
function setSortBtn() {
  document.getElementById('sortPrice').classList.toggle('active', sortBy==='price');
  document.getElementById('sortName').classList.toggle('active', sortBy==='name');
}

document.getElementById('showUnavail').onclick = function() {
  showUnavail = !showUnavail;
  this.classList.toggle('active', showUnavail);
  render();
};

document.getElementById('gazpromBtn').onclick = function() {
  showOnlyGazprom = !showOnlyGazprom;
  this.classList.toggle('active', showOnlyGazprom);
  if (showOnlyGazprom) {
    document.getElementById('sortPrice').disabled = false;
    document.getElementById('sortName').disabled = false;
  }
  loadStations();
};

document.getElementById('refreshBtn').onclick = async function() {
  this.disabled = true;
  this.textContent = '⏳ Обновляю…';
  try {
    const r = await fetch(API + '/stations/refresh', { method: 'POST' });
    if (r.status === 429) {
      const d = await r.json().catch(() => ({}));
      this.textContent = '⏳ ' + (d.detail || 'Слишком часто');
      setTimeout(() => { this.textContent = '🔄 Обновить'; this.disabled = false; }, 2500);
      // данные всё равно перечитаем — вдруг кто-то обновил
      await loadSummary(); await loadStations();
      return;
    }
    await loadSummary();
    await loadStations();
  } catch (_) {
    this.textContent = '⚠ Ошибка сети';
    setTimeout(() => { this.textContent = '🔄 Обновить'; }, 2500);
  } finally {
    if (this.textContent === '⏳ Обновляю…') this.textContent = '🔄 Обновить';
    this.disabled = false;
  }
};

async function loadVersion() {
  try {
    const d = await (await fetch(API + '/version')).json();
    document.title = `Petrol v${d.version} — цены на топливо в Иваново`;
  } catch (_) { /* не критично */ }
}

(async function() {
  initMap();
  try {
    await loadVersion();
    await loadSummary();
    await loadStations();
  } catch (_) {
    document.getElementById('list').innerHTML =
      '<div class="empty">⚠ Не удалось загрузить данные.<br>Проверьте соединение и обновите страницу.</div>';
  }
})();

// ===== Обновление приложения (PWA) =====
function showUpdateBar(worker) {
  const bar = document.getElementById('updateBar');
  bar.classList.add('show');
  document.getElementById('updateBtn').onclick = () => {
    // просим новый SW активироваться; перезагрузка — по controllerchange
    worker.postMessage('SKIP_WAITING');
    document.getElementById('updateBtn').textContent = '⏳';
  };
  document.getElementById('updateDismiss').onclick = () => bar.classList.remove('show');
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });

      // уже есть ожидающий SW (обновление пришло между сессиями)
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateBar(reg.waiting);

      // новый SW начал устанавливаться
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBar(nw);
          }
        });
      });

      // когда новый SW взял управление — один раз перезагружаем
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });

      // периодически проверять обновления (раз в час) + при возврате на вкладку
      setInterval(() => reg.update().catch(() => {}), 3600000);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') reg.update().catch(() => {});
      });
    } catch (_) { /* SW недоступен — приложение работает без офлайна */ }
  });
}
</script>
</body>
</html>
