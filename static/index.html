<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ГдеБЕНЗ — где есть бензин · Иваново</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ГдеБЕНЗ">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg:#0f1115; --panel:#1a1d24; --panel2:#21252e; --border:#2c313c;
    --text:#e6e8ec; --muted:#8b92a0; --accent:#4f9cff;
    --yes:#2ecc71; --queue:#e67e22; --low:#f1c40f; --no:#e74c3c; --gray:#8b92a0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
  header { padding:12px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:18px; font-weight:700; letter-spacing:.2px; }
  header .sub { color:var(--muted); font-size:13px; }
  header .ver { margin-left:auto; color:var(--muted); font-size:11px; opacity:.6; }

  .legend { display:flex; gap:14px; padding:8px 18px; border-bottom:1px solid var(--border);
    flex-wrap:wrap; font-size:12px; color:var(--muted); }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .ldot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  .controls { padding:10px 18px; display:flex; gap:8px; align-items:center;
    border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:20px; padding:6px 14px; font-size:13px; cursor:pointer; }
  .chip.active { border-color:var(--accent); color:var(--accent); background:rgba(79,156,255,.1); }
  button.tbtn { background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; }
  button.tbtn.active { border-color:var(--accent); color:var(--accent); }
  .controls .count { color:var(--muted); font-size:12px; margin-left:auto; }

  .main { display:grid; grid-template-columns:1fr 400px; height:calc(100vh - 0px); }
  #map { height:100%; background:#0a0c10; }
  .list { background:var(--panel); border-left:1px solid var(--border); overflow-y:auto; }
  .row { padding:11px 16px; border-bottom:1px solid var(--border); cursor:pointer;
    transition:background .12s; }
  .row:hover, .row.sel { background:var(--panel2); }
  .row .top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .row .name { font-size:14px; font-weight:600; }
  .row .price { font-size:15px; font-weight:700; white-space:nowrap; color:var(--muted); }
  .row .addr { font-size:12px; color:var(--muted); margin-top:3px; }
  .row .brand { font-size:11px; color:var(--accent); }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%;
    margin-right:7px; vertical-align:middle; }
  .meta { margin-top:5px; font-size:11px; color:var(--muted); display:flex; gap:10px; align-items:center; }
  .sbadge { font-size:11px; padding:2px 9px; border-radius:10px; font-weight:700; }
  .empty { padding:30px; text-align:center; color:var(--muted); }
  .pin { border-radius:50%; border:2px solid #fff; box-shadow:0 0 4px rgba(0,0,0,.6);
    width:100%; height:100%; }

  /* Детальная панель */
  .drawer { position:fixed; top:0; right:0; bottom:0; width:380px; max-width:100vw;
    background:var(--panel); border-left:1px solid var(--border); transform:translateX(100%);
    transition:transform .25s; z-index:1500; overflow-y:auto; box-shadow:-8px 0 30px rgba(0,0,0,.5); }
  .drawer.open { transform:translateX(0); }
  .drawer .dhead { padding:16px 18px; border-bottom:1px solid var(--border); position:sticky; top:0;
    background:var(--panel); }
  .drawer .dhead h2 { font-size:16px; margin-bottom:4px; }
  .drawer .dhead .x { position:absolute; top:14px; right:16px; background:none; border:none;
    color:var(--muted); font-size:20px; cursor:pointer; }
  .drawer .body { padding:16px 18px; }
  .sect { margin-bottom:18px; }
  .sect h3 { font-size:12px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; letter-spacing:.5px; }
  .prices-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .pcell { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .pcell .pf { font-size:11px; color:var(--muted); }
  .pcell .pv { font-size:15px; font-weight:700; }
  .markbtns { display:flex; gap:6px; flex-wrap:wrap; }
  .markbtn { border:none; border-radius:8px; padding:8px 12px; font-size:13px; font-weight:700;
    cursor:pointer; color:#fff; }
  .comment { background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:9px 11px; margin-bottom:7px; }
  .comment .cauth { font-size:11px; color:var(--accent); }
  .comment .ctext { font-size:13px; margin-top:2px; }
  .comment .ctime { font-size:10px; color:var(--muted); margin-top:3px; }
  .cform input, .cform textarea, .cform select { width:100%; background:var(--panel2);
    color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px;
    font-size:13px; margin-bottom:7px; font-family:inherit; }
  .cform button { background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:9px 14px; font-size:13px; font-weight:700; cursor:pointer; width:100%; }

  /* Чат-бот */
  .fab { position:fixed; right:18px; bottom:18px; z-index:1400; width:56px; height:56px;
    border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:24px;
    cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.5); }
  .chat { position:fixed; right:18px; bottom:84px; width:340px; max-width:calc(100vw - 36px);
    height:460px; max-height:calc(100vh - 110px); background:var(--panel);
    border:1px solid var(--border); border-radius:14px; z-index:1450; display:none;
    flex-direction:column; box-shadow:0 10px 40px rgba(0,0,0,.6); overflow:hidden; }
  .chat.open { display:flex; }
  .chat .chead { padding:12px 14px; border-bottom:1px solid var(--border); font-weight:700;
    display:flex; align-items:center; gap:8px; }
  .chat .chead .x { margin-left:auto; background:none; border:none; color:var(--muted);
    font-size:18px; cursor:pointer; }
  .chat .msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:85%; padding:8px 11px; border-radius:12px; font-size:13px; line-height:1.35; }
  .msg.bot { background:var(--panel2); border:1px solid var(--border); align-self:flex-start;
    border-bottom-left-radius:4px; }
  .msg.me { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg .st { display:block; font-size:12px; margin-top:4px; cursor:pointer; color:var(--accent); }
  .msg.bot .st { color:var(--accent); }
  .chat .cin { display:flex; gap:6px; padding:10px; border-top:1px solid var(--border); }
  .chat .cin input { flex:1; background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:20px; padding:9px 13px; font-size:13px; }
  .chat .cin button { background:var(--accent); color:#fff; border:none; border-radius:50%;
    width:38px; height:38px; cursor:pointer; font-size:16px; }
  .chips-quick { display:flex; gap:6px; flex-wrap:wrap; padding:0 10px 8px; }
  .chips-quick button { background:var(--panel2); border:1px solid var(--border); color:var(--muted);
    border-radius:14px; padding:5px 10px; font-size:11px; cursor:pointer; }

  .update-bar { position:fixed; left:50%; bottom:84px; transform:translateX(-50%);
    background:var(--accent); color:#fff; border-radius:12px; padding:12px 16px; display:none;
    align-items:center; gap:14px; box-shadow:0 6px 24px rgba(0,0,0,.5); z-index:9999; font-size:14px; }
  .update-bar.show { display:flex; }
  .update-bar button { background:#fff; color:var(--accent); border:none; font-weight:700;
    padding:7px 14px; border-radius:8px; cursor:pointer; }
  .update-bar .x { background:transparent; color:#fff; padding:4px 8px; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid currentColor;
    border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:820px) {
    .main { grid-template-columns:1fr; grid-template-rows:48vh 1fr; }
    .list { border-left:none; border-top:1px solid var(--border); }
    .drawer { width:100vw; }
  }
</style>
</head>
<body>
<header>
  <h1>⛽ ГдеБЕНЗ</h1>
  <span class="sub">где есть топливо · Иваново</span>
  <span class="ver" id="appVersion"></span>
</header>

<div class="legend">
  <span><i class="ldot" style="background:var(--yes)"></i>есть</span>
  <span><i class="ldot" style="background:var(--queue)"></i>очередь</span>
  <span><i class="ldot" style="background:var(--low)"></i>мало / лимит</span>
  <span><i class="ldot" style="background:var(--no)"></i>нет</span>
  <span><i class="ldot" style="background:var(--gray)"></i>нет данных</span>
</div>

<div class="controls">
  <div class="chips" id="fuelChips"></div>
  <button class="tbtn" id="onlyYes">🟢 только где есть</button>
  <button class="tbtn" id="refreshBtn">🔄 Обновить</button>
  <button class="tbtn" id="appUpdateBtn" title="Установить новую версию приложения">⬆️</button>
  <span class="count" id="count"></span>
</div>

<div class="main">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<!-- Детальная панель АЗС -->
<div class="drawer" id="drawer">
  <div class="dhead">
    <button class="x" id="drawerClose">✕</button>
    <h2 id="dName">АЗС</h2>
    <div class="sub" id="dAddr" style="color:var(--muted);font-size:12px"></div>
  </div>
  <div class="body" id="drawerBody"></div>
</div>

<!-- Чат-бот -->
<button class="fab" id="chatFab" title="Спросить бота">💬</button>
<div class="chat" id="chat">
  <div class="chead">🤖 Помощник ГдеБЕНЗ <button class="x" id="chatClose">✕</button></div>
  <div class="msgs" id="chatMsgs"></div>
  <div class="chips-quick">
    <button data-q="где есть 95 рядом">где есть 95</button>
    <button data-q="где нет дизеля">где нет ДТ</button>
    <button data-q="где очереди">очереди</button>
    <button data-q="сколько стоит 95">цена 95</button>
  </div>
  <div class="cin">
    <input id="chatInput" placeholder="Спросите про топливо…" autocomplete="off">
    <button id="chatSend">➤</button>
  </div>
</div>

<div class="update-bar" id="updateBar">
  <span>🔄 Доступна новая версия</span>
  <button id="updateBtn">Обновить</button>
  <button class="x" id="updateDismiss">✕</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = (window.PETROL_API || '').replace(/\/$/, '');
const IVANOVO = [57.0, 40.97];
let map, markers = {}, stations = [], curFuel = '', onlyYes = false;
let userPos = null, swRegistration = null;

const STATE_COLOR = { yes:'#2ecc71', queue:'#e67e22', low:'#f1c40f', no:'#e74c3c' };
const STATE_LABEL = { yes:'🟢 есть', queue:'🟠 очередь', low:'🟡 мало', no:'🔴 нет' };
const STATE_BG = { yes:'rgba(46,204,113,.15)', queue:'rgba(230,126,34,.15)',
                   low:'rgba(241,196,15,.15)', no:'rgba(231,76,60,.18)' };
const GRAY = '#8b92a0';

function colorOf(s) { return STATE_COLOR[s?.avail_state] || GRAY; }

function initMap() {
  map = L.map('map', { zoomControl:true, attributionControl:false }).setView(IVANOVO, 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
      userPos = [p.coords.latitude, p.coords.longitude];
      L.circleMarker(userPos, { radius:7, color:'#4f9cff', fillColor:'#4f9cff',
        fillOpacity:.9, weight:2 }).addTo(map).bindPopup('Вы здесь');
    }, () => {}, { timeout:5000 });
  }
}

async function loadFuels() {
  try {
    const d = await (await fetch(API + '/prices/summary')).json();
    const chips = document.getElementById('fuelChips');
    const fuels = d.fuels || [];
    // приоритет основных видов топлива
    const order = ['ai92','ai95','ai98','diesel','gas'];
    fuels.sort((a,b) => order.indexOf(a.fuel_type) - order.indexOf(b.fuel_type));
    chips.innerHTML = '<button class="chip active" data-fuel="">все</button>' +
      fuels.map(f => `<button class="chip" data-fuel="${f.fuel_type}">${f.fuel_name}</button>`).join('');
    chips.querySelectorAll('.chip').forEach(c => c.onclick = () => {
      curFuel = c.dataset.fuel;
      chips.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x === c));
      loadStations();
    });
  } catch (_) {}
}

async function loadStations() {
  const url = `${API}/stations?sort=name` + (curFuel ? `&fuel=${curFuel}` : '');
  stations = await (await fetch(url)).json();
  render();
}

function statusBadge(s) {
  if (s.avail_state) {
    return `<span class="sbadge" style="background:${STATE_BG[s.avail_state]};color:${STATE_COLOR[s.avail_state]}">${STATE_LABEL[s.avail_state]}${s.avail_confirmations>1?' · '+s.avail_confirmations:''}</span>`;
  }
  return `<span class="sbadge" style="background:rgba(139,146,160,.15);color:var(--gray)">нет данных</span>`;
}

function render() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const list = document.getElementById('list');
  const visible = onlyYes ? stations.filter(s => s.avail_state === 'yes') : stations;
  document.getElementById('count').textContent = `${visible.length} из ${stations.length} АЗС`;

  if (!visible.length) { list.innerHTML = '<div class="empty">Нет данных</div>'; return; }

  list.innerHTML = visible.map(s => {
    const c = colorOf(s);
    const price = s.price != null ? s.price.toFixed(2)+' ₽' : '';
    const com = s.comment_count ? `💬 ${s.comment_count}` : '';
    return `<div class="row" data-id="${s.id}">
      <div class="top">
        <span class="name"><span class="dot" style="background:${c}"></span>${s.name||'АЗС'}</span>
        <span class="price">${price}</span>
      </div>
      <div class="brand">${s.brand||''}</div>
      <div class="addr">${s.address||''}</div>
      <div class="meta">${statusBadge(s)} ${com}</div>
    </div>`;
  }).join('');

  visible.forEach(s => {
    if (s.lat == null || s.lon == null) return;
    const c = colorOf(s);
    const icon = L.divIcon({ className:'', iconSize:[18,18],
      html:`<div class="pin" style="background:${c}"></div>` });
    const m = L.marker([s.lat, s.lon], { icon }).addTo(map);
    const price = s.price != null ? `<br>${s.price.toFixed(2)} ₽` : '';
    m.bindPopup(`<b>${s.name||'АЗС'}</b><br>${s.brand||''}<br>${STATE_LABEL[s.avail_state]||'нет данных'}${price}`);
    m.on('click', () => openDrawer(s.id));
    markers[s.id] = m;
  });

  list.querySelectorAll('.row').forEach(row => {
    const id = +row.dataset.id;
    row.onclick = () => {
      const s = stations.find(x => x.id === id);
      if (s && s.lat) { map.setView([s.lat, s.lon], 15); markers[id]?.openPopup(); }
      openDrawer(id);
    };
  });
}

// ===== Детальная панель + комментарии + отметка статуса =====
async function openDrawer(id) {
  const s = stations.find(x => x.id === id);
  if (!s) return;
  document.getElementById('dName').textContent = s.name || 'АЗС';
  document.getElementById('dAddr').textContent = [s.brand, s.address].filter(Boolean).join(' · ');
  const body = document.getElementById('drawerBody');
  body.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  document.getElementById('drawer').classList.add('open');

  let detail = {}, comments = [];
  try { detail = await (await fetch(`${API}/stations/${id}`)).json(); } catch(_) {}
  try { comments = await (await fetch(`${API}/community/comments?station_id=${id}`)).json(); } catch(_) {}

  const prices = (detail.prices || []);
  const pricesHtml = prices.length
    ? `<div class="prices-grid">${prices.map(p =>
        `<div class="pcell"><div class="pf">${p.fuel_name}</div><div class="pv">${p.price.toFixed(2)} ₽</div></div>`).join('')}</div>`
    : '<div class="sub" style="color:var(--muted);font-size:13px">Цен нет</div>';

  const markHtml = ['yes','queue','low','no'].map(st =>
    `<button class="markbtn" style="background:${STATE_COLOR[st]}" data-mark="${st}">${STATE_LABEL[st]}</button>`).join('');

  const comHtml = comments.length
    ? comments.map(c => `<div class="comment">
        <div class="cauth">${c.author || (c.source==='gdebenz'?'водитель (ГдеБЕНЗ)':'аноним')}${c.state?' · '+(STATE_LABEL[c.state]||''):''}</div>
        <div class="ctext">${esc(c.text)}</div>
        <div class="ctime">${c.created_at ? c.created_at.slice(0,16).replace('T',' ') : ''}</div>
      </div>`).join('')
    : '<div class="sub" style="color:var(--muted);font-size:13px">Пока нет комментариев</div>';

  body.innerHTML = `
    <div class="sect"><h3>Статус — отметить</h3><div class="markbtns">${markHtml}</div></div>
    <div class="sect"><h3>Цены</h3>${pricesHtml}</div>
    <div class="sect"><h3>Комментарии (${comments.length})</h3><div id="comList">${comHtml}</div></div>
    <div class="sect cform">
      <h3>Оставить комментарий</h3>
      <input id="cAuthor" placeholder="Имя (необязательно)" maxlength="40">
      <textarea id="cText" placeholder="Что с топливом на этой АЗС?" rows="3" maxlength="500"></textarea>
      <button id="cSend">Отправить</button>
    </div>`;

  body.querySelectorAll('.markbtn').forEach(b => b.onclick = async () => {
    b.disabled = true;
    try {
      await fetch(`${API}/community/mark`, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ station_id:id, state:b.dataset.mark }) });
      s.avail_state = b.dataset.mark;
      s.avail_confirmations = (s.avail_confirmations||0) + 1;
      render();
      b.textContent = '✓';
    } catch(_) { b.textContent = '⚠'; }
    setTimeout(() => { b.disabled = false; b.innerHTML = STATE_LABEL[b.dataset.mark]; }, 1200);
  });

  document.getElementById('cSend').onclick = async () => {
    const text = document.getElementById('cText').value.trim();
    if (!text) return;
    const author = document.getElementById('cAuthor').value.trim() || null;
    const btn = document.getElementById('cSend');
    btn.disabled = true; btn.textContent = 'Отправляю…';
    try {
      await fetch(`${API}/community/comments`, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ station_id:id, text, author }) });
      s.comment_count = (s.comment_count||0) + 1;
      openDrawer(id);  // перерисовать
      loadStations();
    } catch(_) { btn.textContent = '⚠ Ошибка'; btn.disabled = false; }
  };
}
function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
document.getElementById('drawerClose').onclick = () => document.getElementById('drawer').classList.remove('open');

// ===== Чат-бот =====
const chat = document.getElementById('chat'), chatMsgs = document.getElementById('chatMsgs');
function chatOpen(o){ chat.classList.toggle('open', o); if (o && !chatMsgs.children.length) botSay('Привет! Спросите: «где есть 95 рядом», «где нет ДТ», «сколько стоит 95».'); }
document.getElementById('chatFab').onclick = () => chatOpen(!chat.classList.contains('open'));
document.getElementById('chatClose').onclick = () => chatOpen(false);
function addMsg(text, cls, extraHtml='') {
  const d = document.createElement('div'); d.className = 'msg ' + cls;
  d.innerHTML = esc(text) + extraHtml; chatMsgs.appendChild(d); chatMsgs.scrollTop = chatMsgs.scrollHeight;
}
function botSay(t, extra=''){ addMsg(t, 'bot', extra); }
async function ask(q) {
  addMsg(q, 'me');
  const typing = document.createElement('div'); typing.className='msg bot'; typing.innerHTML='<span class="spinner"></span>';
  chatMsgs.appendChild(typing); chatMsgs.scrollTop = chatMsgs.scrollHeight;
  try {
    const payload = { message:q };
    if (userPos) { payload.lat = userPos[0]; payload.lon = userPos[1]; }
    const d = await (await fetch(`${API}/community/chat`, { method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })).json();
    typing.remove();
    const sts = (d.stations || []).slice(0,6).map(st => {
      const label = st.state_label || (st.price != null ? st.price.toFixed(2)+' ₽' : '');
      return `<span class="st" data-id="${st.id}">📍 ${esc(st.name||'АЗС')} — ${label} · ${st.dist_km} км</span>`;
    }).join('');
    botSay(d.answer || 'Готово.', sts);
    chatMsgs.querySelectorAll('.st').forEach(el => el.onclick = () => {
      const id = +el.dataset.id; const s = stations.find(x => x.id === id);
      if (s && s.lat) { map.setView([s.lat, s.lon], 15); }
      openDrawer(id); chatOpen(false);
    });
  } catch(_) { typing.remove(); botSay('⚠ Не удалось получить ответ.'); }
}
document.getElementById('chatSend').onclick = () => {
  const i = document.getElementById('chatInput'); const q = i.value.trim();
  if (q) { ask(q); i.value=''; }
};
document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('chatSend').click(); });
document.querySelectorAll('.chips-quick button').forEach(b => b.onclick = () => ask(b.dataset.q));

// ===== Кнопки управления =====
document.getElementById('onlyYes').onclick = function(){ onlyYes = !onlyYes; this.classList.toggle('active', onlyYes); render(); };
document.getElementById('refreshBtn').onclick = async function(){
  this.disabled = true; const t = this.textContent; this.innerHTML = '<span class="spinner"></span> Обновляю…';
  try { await fetch(`${API}/stations/refresh`, { method:'POST' }).catch(()=>{}); await loadStations();
    this.textContent = '✓ Готово'; }
  catch(_) { this.textContent = '⚠ Ошибка'; }
  setTimeout(() => { this.textContent = t; this.disabled = false; }, 2000);
};

async function loadVersion() {
  try {
    const d = await (await fetch(API + '/version')).json();
    const el = document.getElementById('appVersion');
    const short = d.version.split('+')[0], hash = d.version.split('+')[1];
    el.textContent = hash ? `v${short} (${hash.slice(0,7)})` : `v${d.version}`;
  } catch(_) {}
}

(async function(){
  initMap();
  try { await loadVersion(); await loadFuels(); await loadStations(); }
  catch(_) { document.getElementById('list').innerHTML =
    '<div class="empty">⚠ Не удалось загрузить данные. Обновите страницу.</div>'; }
})();

// ===== PWA-обновление =====
let appVersion = null;
async function checkAppVersion(){ try { return (await (await fetch(API+'/version')).json()).version; } catch(_){ return null; } }
function showUpdateBar(worker, reason='Доступна новая версия'){
  const bar = document.getElementById('updateBar');
  bar.querySelector('span').textContent = '🔄 ' + reason; bar.classList.add('show');
  document.getElementById('updateBtn').onclick = () => { worker.postMessage('SKIP_WAITING'); };
  document.getElementById('updateDismiss').onclick = () => bar.classList.remove('show');
}
document.getElementById('appUpdateBtn').onclick = async function(){
  if (!('serviceWorker' in navigator)) { location.reload(); return; }
  this.disabled = true; const o = this.textContent; this.innerHTML = '<span class="spinner"></span>';
  try {
    const reg = swRegistration || await navigator.serviceWorker.getRegistration();
    if (!reg) { location.reload(); return; }
    await reg.update();
    if (reg.installing) { const i = reg.installing; await new Promise(r => i.addEventListener('statechange', () => { if (i.state==='installed'||i.state==='redundant') r(); })); }
    if (reg.waiting) { reg.waiting.postMessage('SKIP_WAITING'); setTimeout(() => location.reload(), 3000); }
    else { this.textContent = '✓'; setTimeout(() => { this.textContent = o; this.disabled = false; }, 2000); }
  } catch(_) { this.textContent = '⚠'; setTimeout(() => { this.textContent = o; this.disabled = false; }, 2000); }
};
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      appVersion = await checkAppVersion();
      const reg = await navigator.serviceWorker.register('/sw.js', { updateViaCache:'none' });
      swRegistration = reg;
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateBar(reg.waiting, 'Новая версия готова!');
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', () => { if (nw.state==='installed' && navigator.serviceWorker.controller) showUpdateBar(nw, 'Новая версия загружена'); });
      });
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => { if (reloaded) return; reloaded = true; setTimeout(() => location.reload(), 500); });
      reg.update().catch(()=>{});
      setInterval(() => reg.update().catch(()=>{}), 3600000);
      document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') reg.update().catch(()=>{}); });
    } catch(_) {}
  });
}
